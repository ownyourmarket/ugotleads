<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Buyer-default favicon: green "my CRM" badge (standalone SVG renders
       in its own document, so the font must be a generic family — no page
       fonts here). Mirrors components/brand/logo-mark.tsx MyCrmMark. -->
  <defs>
    <linearGradient id="mycrm-fav" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="55%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#6ee7b8"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="#18181b"/>
  <text x="32" y="38" text-anchor="middle" font-family="Arial, Helvetica, sans-serif"
        font-weight="bold" font-size="24" letter-spacing="0.5"
        fill="url(#mycrm-fav)">CRM</text>
  <rect x="19" y="44" width="26" height="4" rx="2" fill="url(#mycrm-fav)"/>
</svg>
